name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Accept Android licenses (force)
      run: |
        mkdir -p ~/.android
        echo "count=1" > ~/.android/repositories.cfg
        yes | sdkmanager --licenses --sdk_root=/usr/local/lib/android/sdk || true
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
    
    - name: Build APK
      run: |
        buildozer android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: callerid-apk
        path: bin/*.apk
