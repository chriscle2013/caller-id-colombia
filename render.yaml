services:
  - type: web
    name: caller-id-colombia
    runtime: python
    repo: https://github.com/TU-USUARIO/caller-id-colombia
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
