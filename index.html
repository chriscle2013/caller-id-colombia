<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Identificador Llamadas Colombia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(0.98);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .result.success {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .result.error {
            background: #ffebee;
            border: 1px solid #f44336;
            display: block;
        }
        
        .result-info {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .spam-high {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .spam-medium {
            background: #fff3e0;
            color: #ef6c00;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .spam-low {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .report-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .btn-secondary {
            background: #ff9800;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 20px;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Identificador Llamadas Colombia</h1>
            <p>Identifica quién te llama - Gratis y sin publicidad</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label>🔍 Número de teléfono</label>
                <input type="tel" id="phoneInput" placeholder="Ej: 3001234567 o +573001234567">
            </div>
            <button onclick="identificarNumero()">🔎 Identificar número</button>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Identificando...</p>
            </div>
            
            <div id="result" class="result"></div>
            <!-- Agregar después del div result -->
<div class="card" id="emergenciasCard" style="display: none;">
    <h3 style="margin-bottom: 15px;">🚨 Números de Emergencia Colombia</h3>
    <div id="listaEmergencias" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px;">
    </div>
</div>
        </div>
        
        <div class="footer">
            <p>🇨🇴 Base de datos colaborativa colombiana</p>
            <p>Reporta números spam para ayudar a la comunidad</p>
        </div>
    </div>
    
    <script>
        const API_URL = "https://caller-id-colombia.onrender.com";
        let ultimoNumero = "";
        
        async function identificarNumero() {
            const phone = document.getElementById('phoneInput').value.trim();
            
            if (!phone) {
                mostrarError('Por favor ingresa un número de teléfono');
                return;
            }
            
            ultimoNumero = phone;
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/identify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone: phone })
                });
                
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    mostrarResultado(data);
                } else {
                    mostrarError(data.error || 'Número no válido');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('No se pudo conectar al servidor. ¿Está ejecutando python app.py?');
            } finally {
                mostrarLoading(false);
            }
        }
        
        function mostrarResultado(data) {
            const resultDiv = document.getElementById('result');
            
            let riesgoHTML = '';
            if (data.spam_risk === 'high') {
                riesgoHTML = `<div class="spam-high">🚨 ¡ALTO RIESGO! Este número ha sido reportado ${data.reports} veces como spam</div>`;
            } else if (data.spam_risk === 'medium') {
                riesgoHTML = `<div class="spam-medium">⚠️ RIESGO MEDIO - Ten precaución (${data.reports} reportes)</div>`;
            } else if (data.reports > 0) {
                riesgoHTML = `<div class="spam-low">ℹ️ Reportado ${data.reports} veces - Precaución moderada</div>`;
            }
            
            resultDiv.innerHTML = `
                <div style="font-weight: bold; font-size: 18px; margin-bottom: 15px;">✅ NÚMERO VÁLIDO</div>
                <div class="result-info">
                    <p><strong>📞 Número:</strong> ${data.national || data.formatted}</p>
                    <p><strong>📱 Tipo:</strong> ${data.type || 'Móvil'}</p>
                    <p><strong>🏢 Operador:</strong> ${data.carrier || 'Desconocido'}</p>
                    <p><strong>📍 Ubicación:</strong> ${data.location || 'Colombia'}</p>
                    <p><strong>📊 Reportes:</strong> ${data.reports || 0}</p>
                </div>
                ${riesgoHTML}
                <div class="report-section">
                    <p><strong>📝 ¿Recibiste spam de este número?</strong></p>
                    <select id="reportCategory">
                        <option value="spam">Spam general</option>
                        <option value="telemarketing">Telemarketing</option>
                        <option value="fraud">Estafa / Fraude</option>
                        <option value="safe">Número seguro</option>
                    </select>
                    <textarea id="reportComment" rows="2" placeholder="Comentario (opcional)"></textarea>
                    <button class="btn-secondary" onclick="reportarSpam()">🚨 Reportar número</button>
                </div>
            `;
            resultDiv.className = 'result success';
        }
        
        function mostrarError(mensaje) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 10px;">❌ ERROR</div>
                <p>${mensaje}</p>
                <div style="margin-top: 15px; font-size: 14px; color: #666;">
                    💡 Asegúrate de que el servidor esté corriendo:<br>
                    <code>python app.py</code>
                </div>
            `;
            resultDiv.className = 'result error';
        }
        
        async function reportarSpam() {
            const category = document.getElementById('reportCategory').value;
            const comment = document.getElementById('reportComment').value;
            
            if (!ultimoNumero) return;
            
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/report`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phone: ultimoNumero,
                        category: category,
                        comment: comment
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ¡Gracias por reportar! Ayudas a proteger a la comunidad colombiana.');
                    // Recargar la identificación para mostrar los nuevos reportes
                    identificarNumero();
                } else {
                    alert('❌ Error al reportar: ' + (data.error || 'Intenta de nuevo'));
                }
            } catch (error) {
                alert('❌ Error de conexión al reportar');
            } finally {
                mostrarLoading(false);
            }
        }
        
        function mostrarLoading(mostrar) {
            document.getElementById('loading').style.display = mostrar ? 'block' : 'none';
        }
        
        // Permitir Enter para buscar
        document.getElementById('phoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                identificarNumero();
            }
        });
        // Cargar números de emergencia al iniciar
async function cargarEmergencias() {
    try {
        const response = await fetch(`${API_URL}/emergencias`);
        const emergencias = await response.json();
        
        const container = document.getElementById('listaEmergencias');
        container.innerHTML = '';
        
        for (const [codigo, nombre] of Object.entries(emergencias)) {
            container.innerHTML += `
                <div style="padding: 8px; background: #f5f5f5; border-radius: 8px;">
                    <strong>${codigo}</strong><br>
                    <small>${nombre.substring(0, 30)}</small>
                </div>
            `;
        }
        
        document.getElementById('emergenciasCard').style.display = 'block';
    } catch (error) {
        console.error('Error cargando emergencias:', error);
    }
}

// Llamar al cargar la página
cargarEmergencias();
    </script>
</body>
</html>
